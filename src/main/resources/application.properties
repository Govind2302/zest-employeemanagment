spring.application.name=employee-management
# ── Server ──────────────────────────────────────────────
server.port=8080

# ── Database ────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/zest_employee_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=Anurag
spring.datasource.password=govind
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ─────────────────────────────────────────────────
jwt.secret=zest2024SecureKeyMustBeAtLeast32CharsLongForHS256
jwt.expiration.ms=86400000
# 86400000ms = 24 hours — single token, no refresh