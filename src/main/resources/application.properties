spring.application.name=employee-management
# ── Server ──────────────────────────────────────────────
server.port=8080

# ── Database ────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/zest_employee_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=yourpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ─────────────────────────────────────────────────
jwt.secret=zest2024SecureKeyMustBeAtLeast32CharsLongForHS256
jwt.expiration.ms=900000
# 900000ms = 15 minutes for access token

# refresh token lifetime (days) — used in AuthService
jwt.refresh.expiration.days=7